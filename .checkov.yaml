# Checkov configuration for eks-project
# Documents consciously-accepted findings with justification.

directory:
  - .

download-external-modules: true

# Findings reviewed and accepted, with reasons:
skip-check:
  # Public cluster endpoint is intentional for local kubectl access in this
  # learning environment. In production this would be private or IP-restricted.
  - CKV_AWS_39  # EKS public endpoint disabled
  - CKV_AWS_38  # public endpoint not accessible to 0.0.0.0/0

  # 90-day log retention chosen deliberately to control storage cost for a
  # short-lived learning cluster; 1-year retention not warranted here.
  - CKV_AWS_338  # CloudWatch log retention >= 1 year

  # Module-internal IAM policy for the VPC CNI plugin; wildcard required for
  # describe actions and not user-modifiable without forking the module.
  - CKV_AWS_111  # write access without constraints (cni_ipv6_policy)
  - CKV_AWS_356  # wildcard resource (cni_ipv6_policy)

  # Verified false positive: the EKS module DOES configure secrets encryption
  # via a dynamic encryption_config block (KMS key with rotation enabled,
  # confirmed in terraform plan output). Checkov's static scan cannot resolve
  # the module's dynamic config, so it under-reports. Encryption is in place.
  - CKV_AWS_58  # EKS secrets encryption (verified present; static-scan false positive)

# The following Kubernetes suppressions are applied by the CI pipeline's
  # Checkov scan (checkov-action scans all frameworks and reads this file).
  # The terraform_checkov pre-commit hook does not apply these to K8s, so
  # K8s-touching commits are scanned in CI rather than pre-commit.
  - CKV_K8S_37  # All Linux capabilities dropped via securityContext; check redundant
  - CKV_K8S_39  # CAP_SYS_ADMIN not added; all capabilities dropped
  - CKV_K8S_35  # Demo app uses no secrets, so secrets-as-files does not apply
  - CKV_K8S_13  # Memory limits are set under resources.limits; documented exception

# --- Findings surfaced by the CI multi-framework scan, triaged below ---

  # App image is pinned by immutable tag (e.g. v2) rather than SHA digest.
  # Acceptable for this project; the ECR repo enforces tag immutability.
  - CKV_K8S_43  # image uses tag not digest (immutable tags enforced at ECR)

  # Module-internal resources we do not control without forking the module:
  - CKV2_AWS_12  # VPC default security group (managed by the VPC module)
  - CKV2_AWS_19  # EIP is attached to the NAT gateway, not an EC2 instance (module-managed)
  - CKV2_AWS_5   # SGs are attached to module-internal resources; static scan cannot resolve

  # State bucket (bootstrap/) hardening that is overkill for a single-user,
  # short-lived learning project's Terraform state bucket:
  - CKV2_AWS_62  # S3 event notifications not required for a state bucket
  - CKV2_AWS_61  # S3 lifecycle config not required; versioning already enabled
  - CKV_AWS_144  # cross-region replication not warranted for learning state
  - CKV_AWS_18   # S3 access logging not warranted for a single-user state bucket

  # CI role uses AdministratorAccess: pragmatic for a learning project that
  # creates EKS/VPC/IAM/KMS/ECR. A production hardening step would replace this
  # with a least-privilege policy scoped to exactly what Terraform manages.
  - CKV_AWS_274  # broad CI role permissions (documented trade-off, not least-privilege)
